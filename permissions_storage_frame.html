<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 140px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      background: #f0f4ff;
    }
    .inner { text-align: center; padding: 10px; width: 100%; }
    .hint { color: #888; font-size: 11px; margin-bottom: 10px; }
    button {
      padding: 9px 22px;
      background: #4f6bed;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #msg { margin-top: 10px; font-weight: 600; min-height: 16px; line-height: 1.4; }
    #warn { margin-top: 8px; font-size: 11px; color: #e65100; display: none; }
  </style>
</head>
<body>
  <div class="inner">
    <div class="hint">跨域 iframe（barrycheng-cloudmosa.github.io）</div>
    <div id="msg">偵測中…</div>
    <div id="warn"></div>
    <!-- Button only shown if browser requires user gesture -->
    <button id="btn" style="display:none; margin-top:10px;" onclick="requestWithGesture(this)">手動測試（點此觸發請求）</button>
  </div>

  <script>
    const parentOrigin = (location.ancestorOrigins && location.ancestorOrigins.length > 0)
      ? location.ancestorOrigins[0]
      : '*';

    function post(data) {
      try { window.parent.postMessage(data, parentOrigin); } catch (_) {}
    }

    const msgEl  = document.getElementById('msg');
    const warnEl = document.getElementById('warn');
    const btnEl  = document.getElementById('btn');

    function setMsg(color, text) {
      msgEl.style.color = color;
      msgEl.textContent = text;
    }

    // On load: try requestStorageAccess() WITHOUT a user gesture.
    // - If Chrome's interaction heuristic is active → auto-grants (result unreliable)
    // - If blocked by content setting → NotAllowedError immediately
    // - If allowed but needs gesture → NotAllowedError about user gesture
    (async () => {
      if (!('requestStorageAccess' in document)) {
        setMsg('#c5221f', '❌ 不支援 requestStorageAccess()');
        post({ type: 'storage-access-result', state: 'unsupported' });
        return;
      }

      try {
        await document.requestStorageAccess();
        // Auto-granted without user gesture → Chrome's heuristic overrode the setting
        setMsg('#e65100', '⚠️ Chrome 互動啟發式規則自動授予（結果不反映設定）');
        warnEl.style.display = 'block';
        warnEl.textContent = '您曾訪問過此 origin，Chrome 自動繞過設定授予權限。請用全新隱私視窗或清除 barrycheng-cloudmosa.github.io 網站資料後重試。';
        post({ type: 'storage-access-result', state: 'heuristic-granted' });
      } catch (e) {
        if (/gesture|activation|user/i.test(e.message) || e.name === 'SecurityError') {
          // Browser requires user gesture → setting is ALLOW (or prompt), not BLOCK
          setMsg('#1967d2', 'ℹ️ 設定為「允許」（需手動點按鈕觸發請求）');
          btnEl.style.display = 'inline-block';
          post({ type: 'storage-access-result', state: 'requires-gesture' });
        } else {
          // Rejected before user gesture even possible → BLOCKED by content setting
          setMsg('#1e7e34', '✅ 正確封鎖（Chrome 設定：已禁止）');
          post({ type: 'storage-access-result', state: 'denied', error: e.name + ': ' + e.message });
        }
      }
    })();

    async function requestWithGesture(btn) {
      btn.disabled = true;
      setMsg('#333', '請求中…');
      try {
        await document.requestStorageAccess();
        setMsg('#1e7e34', '✅ requestStorageAccess() 已允許（設定：允許）');
        post({ type: 'storage-access-result', state: 'granted' });
      } catch (e) {
        if (/blocked|denied|not allowed/i.test(e.message) || e.name === 'NotAllowedError') {
          setMsg('#1e7e34', '✅ 正確封鎖（Chrome 設定：已禁止）');
          post({ type: 'storage-access-result', state: 'denied-by-setting', error: e.name + ': ' + e.message });
        } else {
          setMsg('#c5221f', '❌ 使用者取消：' + e.name);
          post({ type: 'storage-access-result', state: 'denied', error: e.name + ': ' + e.message });
        }
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
