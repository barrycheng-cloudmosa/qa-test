<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 10px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      background: #f0f4ff;
    }
    #origin { color: #888; margin-bottom: 6px; }
    #status { color: #555; margin-bottom: 8px; min-height: 16px; }
    button {
      padding: 5px 14px;
      background: #4f6bed;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
    }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #msg { margin-top: 8px; font-weight: 600; min-height: 16px; }
  </style>
</head>
<body>
  <div id="origin"></div>
  <div id="status">正在查詢權限狀態…</div>
  <button id="btn" onclick="requestAccess()">在此跨域 iframe 內請求 Storage Access</button>
  <div id="msg"></div>

  <script>
    document.getElementById('origin').textContent = '此 iframe origin: ' + location.origin;

    // Derive parent origin from ancestorOrigins if available.
    // Fall back to '*' so this frame works regardless of the parent's domain
    // (safe here because we only send non-sensitive permission status strings).
    const parentOrigin = (location.ancestorOrigins && location.ancestorOrigins.length > 0)
      ? location.ancestorOrigins[0]
      : '*';

    function post(data) {
      try { window.parent.postMessage(data, parentOrigin); } catch (_) {}
    }

    // Query current permission state on load (no user gesture needed)
    (async () => {
      const statusEl = document.getElementById('status');
      if (!('permissions' in navigator)) {
        statusEl.textContent = '不支援 Permissions API';
        post({ type: 'storage-access-status', state: 'unsupported' });
        return;
      }
      try {
        const s = await navigator.permissions.query({ name: 'storage-access' });
        const update = () => {
          statusEl.textContent = '目前權限狀態: ' + s.state;
          post({ type: 'storage-access-status', state: s.state });
        };
        update();
        s.onchange = update;
      } catch (e) {
        statusEl.textContent = '無法查詢 storage-access 狀態: ' + e.message;
        post({ type: 'storage-access-status', state: 'query-error', error: e.message });
      }
    })();

    async function requestAccess() {
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');
      btn.disabled = true;
      msg.style.color = '#333';
      msg.textContent = '請求中…';

      if (!('requestStorageAccess' in document)) {
        msg.style.color = '#c5221f';
        msg.textContent = '❌ 不支援 requestStorageAccess()';
        post({ type: 'storage-access-result', state: 'unsupported' });
        btn.disabled = false;
        return;
      }

      try {
        await document.requestStorageAccess();
        msg.style.color = '#1e7e34';
        msg.textContent = '✅ requestStorageAccess() 已允許';
        post({ type: 'storage-access-result', state: 'granted' });
      } catch (e) {
        msg.style.color = '#c5221f';
        msg.textContent = '❌ ' + e.name + ': ' + e.message;
        post({ type: 'storage-access-result', state: 'denied', error: e.name + ': ' + e.message });
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
